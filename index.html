<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Walks</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333;
            --success: #FFD700;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            background: var(--bg); 
            color: var(--text);
            margin: 0;
        }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box; 
        }

        h2 { text-align: center; margin-top: 0; margin-bottom: 20px; font-weight: 800; }

        /* Dashboard Stats */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #f8f9fa; padding: 12px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #666; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 1.4rem; font-weight: 800; margin: 4px 0; }
        
        /* Progress Bars */
        .progress-container { background: #eee; border-radius: 10px; height: 8px; margin: 8px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.8s ease-in-out; }
        .goal-text { font-size: 0.65rem; color: #999; }

        /* Input Section */
        .input-group { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        input[type="number"] { 
            width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; 
            border-radius: 12px; font-size: 1.2rem; box-sizing: border-box; outline: none; 
        }
        .quick-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .quick-btn { padding: 12px; background: #e8f5e9; color: #2e7d32; border: none; border-radius: 10px; font-weight: 600; font-size: 0.9rem; }
        
        button#submit { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; 
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2); 
        }

        /* Recent Walks List */
        .history-section { margin-top: 25px; width: 100%; }
        .history-title { font-size: 0.9rem; font-weight: bold; color: #666; margin-bottom: 10px; padding-left: 5px; }
        .history-item { 
            display: flex; justify-content: space-between; background: #fff; 
            padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03); font-size: 0.9rem; 
        }
        .hist-date { color: #888; }
        .hist-mins { font-weight: bold; color: var(--primary); }

        #status { text-align: center; font-size: 0.85rem; margin-top: 10px; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Our Walks</h2>
    
    <div class="dashboard">
        <div class="stat-box">
            <div class="stat-label">Weekly</div>
            <div id="curWeek" class="stat-value">0m</div>
            <div class="progress-container"><div id="weekBar" class="progress-bar"></div></div>
            <span class="goal-text">Goal: 150m</span>
        </div>
        <div class="stat-box">
            <div class="stat-label">Monthly</div>
            <div id="curMonth" class="stat-value">0m</div>
            <div class="progress-container"><div id="monthBar" class="progress-bar"></div></div>
            <span id="monthGoalText" class="goal-text">Goal: --</span>
        </div>
    </div>

    <div class="input-group">
        <input type="number" id="duration" inputmode="numeric" placeholder="Minutes walked">
        <div class="quick-btns">
            <button class="quick-btn" onclick="quickLog(20)">20 Min</button>
            <button class="quick-btn" onclick="quickLog(30)">30 Min</button>
        </div>
        <button id="submit" onclick="sendData()">Log Walk</button>
        <p id="status"></p>
    </div>

    <div class="history-section">
        <div class="history-title">Recent Activity</div>
        <div id="historyList">
            </div>
    </div>
</div>

<script>
    // Replace with your Web App URL from Apps Script
    const scriptURL = 'YOUR_APPS_SCRIPT_URL';

    async function loadStats() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            // Stats & Goals
            document.getElementById('curWeek').innerText = data.currentWeek + "m";
            document.getElementById('curMonth').innerText = data.currentMonth + "m";
            document.getElementById('monthGoalText').innerText = `Goal: ${data.monthGoal}m`;

            // Bars
            const wPct = Math.min((data.currentWeek / data.weekGoal) * 100, 100);
            const mPct = Math.min((data.currentMonth / data.monthGoal) * 100, 100);
            document.getElementById('weekBar').style.width = wPct + "%";
            document.getElementById('monthBar').style.width = mPct + "%";
            
            if(wPct >= 100) document.getElementById('weekBar').style.background = "var(--success)";
            if(mPct >= 100) document.getElementById('monthBar').style.background = "var(--success)";

            // Update History List
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            // Assuming the API returns a 'recent' array of [date, mins]
            if (data.recent && data.recent.length > 0) {
                data.recent.forEach(walk => {
                    list.innerHTML += `
                        <div class="history-item">
                            <span class="hist-date">${walk.date}</span>
                            <span class="hist-mins">${walk.mins} mins</span>
                        </div>`;
                });
            }
        } catch (e) { console.log("Load error", e); }
    }

    function quickLog(mins) {
        document.getElementById('duration').value = mins;
        sendData();
    }

    async function sendData() {
        const dur = document.getElementById('duration').value;
        const status = document.getElementById('status');
        if (!dur) return;

        status.innerText = "Saving...";
        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ duration: dur, date: new Date().toLocaleDateString() })
            });
            status.innerText = "✅ Logged!";
            document.getElementById('duration').value = '';
            setTimeout(loadStats, 1000); // Refresh stats
        } catch (e) { status.innerText = "❌ Error"; }
    }

    window.onload = loadStats;
</script>

</body>
</html>
